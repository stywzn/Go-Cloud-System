# ==========================================
# Gateway Service (Ports: 8080)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gcs-gateway
  namespace: gcs-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gcs-gateway
  template:
    metadata:
      labels:
        app: gcs-gateway
    spec:
      containers:
      - name: gateway
        image: gcs-gateway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: GIN_MODE
          value: "release"
        - name: REDIS_HOST
          value: "redis-service" # Internal DNS to Redis Service
        resources:
          requests:
            memory: "128Mi"
            cpu: "250m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gcs-gateway-svc
  namespace: gcs-system
spec:
  selector:
    app: gcs-gateway
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP

---
# ==========================================
# Storage Service (Ports: 8082)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gcs-storage
  namespace: gcs-system
spec:
  replicas: 3 # Storage might need more instances for concurrent uploads
  selector:
    matchLabels:
      app: gcs-storage
  template:
    metadata:
      labels:
        app: gcs-storage
    spec:
      containers:
      - name: storage
        image: gcs-storage:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8082
        env:
        - name: GIN_MODE
          value: "release"
        - name: MYSQL_HOST
          value: "mysql-service"
        - name: MINIO_HOST
          value: "minio-service"
        - name: RABBITMQ_HOST
          value: "rabbitmq-service"
        resources:
          requests:
            memory: "256Mi"
            cpu: "500m"
          limits:
            memory: "512Mi" # File handling requires more memory
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gcs-storage-svc
  namespace: gcs-system
spec:
  selector:
    app: gcs-storage
  ports:
  - port: 8082
    targetPort: 8082
  type: ClusterIP

---
# ==========================================
# Ingress Routing (Clean Paths)
# ==========================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gcs-ingress
  namespace: gcs-system
  # Removed rewrite-target to pass full path (e.g., /api/v1/upload) to Gateway
spec:
  rules:
  - host: gcs.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: gcs-gateway-svc # All API traffic hits Gateway first
            port:
              number: 8080
      - path: /
        pathType: Prefix
        backend:
          service:
            name: gcs-frontend-svc # Assuming frontend has its own service
            port:
              number: 8084