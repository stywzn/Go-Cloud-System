<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Cloud System - 云存储与抽奖系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .service-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .service-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        .service-icon {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .service-title {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: #4a5568;
        }

        .service-description {
            color: #718096;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .status-item {
            text-align: center;
            padding: 20px;
            border-radius: 10px;
            background: #f7fafc;
        }

        .status-value {
            font-size: 2rem;
            font-weight: bold;
            color: #4a5568;
            margin-bottom: 5px;
        }

        .status-label {
            color: #718096;
            font-size: 0.9rem;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            z-index: 2000;
            transform: translateX(400px);
            transition: transform 0.3s ease;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.success {
            background: #48bb78;
        }

        .notification.error {
            background: #f56565;
        }

        .notification.info {
            background: #4299e1;
        }

        .file-upload {
            margin: 20px 0;
        }

        .file-input {
            display: none;
        }

        .file-label {
            display: inline-block;
            padding: 12px 24px;
            background: #e2e8f0;
            color: #4a5568;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .file-label:hover {
            background: #cbd5e0;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🚀 Go Cloud System</h1>
            <p>高并发分布式存储与抽奖互动系统</p>
        </header>

        <div class="status-section">
            <h2>系统状态</h2>
            <div class="status-grid">
                <div class="status-item">
                    <div class="status-value" id="gateway-status">检查中...</div>
                    <div class="status-label">API网关</div>
                </div>
                <div class="status-item">
                    <div class="status-value" id="storage-status">检查中...</div>
                    <div class="status-label">存储服务</div>
                </div>
                <div class="status-item">
                    <div class="status-value" id="interaction-status">检查中...</div>
                    <div class="status-label">抽奖服务</div>
                </div>
                <div class="status-item">
                    <div class="status-value" id="active-users">0</div>
                    <div class="status-label">在线用户</div>
                </div>
            </div>
        </div>

        <div class="services-grid">
            <div class="service-card">
                <div class="service-icon">🎁</div>
                <h3 class="service-title">抽奖系统</h3>
                <p class="service-description">
                    基于Redis Lua脚本的高并发抽奖引擎，支持QPS 16,000+，具备完整的幂等性防护和死信队列机制。
                </p>
                <button class="btn" onclick="tryLottery()">参与抽奖</button>
            </div>

            <div class="service-card">
                <div class="service-icon">☁️</div>
                <h3 class="service-title">文件存储</h3>
                <p class="service-description">
                    分布式文件存储系统，支持大文件分片上传、秒传、配额管理，基于MinIO对象存储。
                </p>
                <div class="file-upload">
                    <input type="file" id="file-input" class="file-input" onchange="uploadFile()">
                    <label for="file-input" class="file-label">选择文件上传</label>
                </div>
                <div class="progress-bar" id="upload-progress" style="display: none;">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>

            <div class="service-card">
                <div class="service-icon">🔧</div>
                <h3 class="service-title">系统管理</h3>
                <p class="service-description">
                    完整的链路追踪、优雅停机、死信队列监控，支持Prometheus指标采集和实时状态监控。
                </p>
                <button class="btn" onclick="showSystemInfo()">查看详情</button>
            </div>
        </div>
    </div>

    <!-- 抽奖结果模态框 -->
    <div id="lottery-modal" class="modal">
        <div class="modal-content">
            <h2 id="lottery-title">抽奖结果</h2>
            <p id="lottery-message"></p>
            <button class="btn" onclick="closeModal('lottery-modal')">确定</button>
        </div>
    </div>

    <!-- 系统信息模态框 -->
    <div id="system-modal" class="modal">
        <div class="modal-content">
            <h2>系统信息</h2>
            <div id="system-info"></div>
            <button class="btn" onclick="closeModal('system-modal')">关闭</button>
        </div>
    </div>

    <!-- 通知提示 -->
    <div id="notification" class="notification"></div>

    <script>
        let authToken = null;
        let userId = null;

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            checkSystemStatus();
            getAuthToken();
        });

        // 获取认证Token
        async function getAuthToken() {
            try {
                const response = await fetch('http://localhost:8080/debug/token');
                const data = await response.json();
                authToken = data.token;
                userId = 9527; // 从Token解析的用户ID
                showNotification('获取认证Token成功', 'success');
            } catch (error) {
                showNotification('获取Token失败，请检查网关服务', 'error');
            }
        }

        // 检查系统状态
        async function checkSystemStatus() {
            const services = [
                { name: 'gateway', url: 'http://localhost:8080/healthz' },
                { name: 'storage', url: 'http://localhost:8080/storage/healthz' },
                { name: 'interaction', url: 'http://localhost:8080/interaction/healthz' }
            ];

            for (const service of services) {
                try {
                    const response = await fetch(service.url);
                    const status = response.ok ? '🟢 在线' : '🔴 离线';
                    document.getElementById(`${service.name}-status`).textContent = status;
                } catch (error) {
                    document.getElementById(`${service.name}-status`).textContent = '🔴 离线';
                }
            }

            // 模拟在线用户数
            document.getElementById('active-users').textContent = Math.floor(Math.random() * 1000) + 100;
        }

        // 参与抽奖
        async function tryLottery() {
            if (!authToken) {
                showNotification('请先获取认证Token', 'error');
                return;
            }

            try {
                const response = await fetch('http://localhost:8080/interaction/api/v1/lottery/seckill', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();
                
                if (response.status === 202) {
                    document.getElementById('lottery-title').textContent = '🎉 恭喜中奖！';
                    document.getElementById('lottery-message').textContent = data.message;
                } else {
                    document.getElementById('lottery-title').textContent = '😔 抽奖失败';
                    document.getElementById('lottery-message').textContent = data.error || '未知错误';
                }
                
                showModal('lottery-modal');
            } catch (error) {
                showNotification('抽奖请求失败: ' + error.message, 'error');
            }
        }

        // 文件上传
        async function uploadFile() {
            const fileInput = document.getElementById('file-input');
            const file = fileInput.files[0];
            
            if (!file) {
                showNotification('请选择文件', 'error');
                return;
            }

            if (!authToken) {
                showNotification('请先获取认证Token', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            // 显示进度条
            const progressContainer = document.getElementById('upload-progress');
            const progressFill = document.getElementById('progress-fill');
            progressContainer.style.display = 'block';

            try {
                const xhr = new XMLHttpRequest();
                
                // 上传进度
                xhr.upload.addEventListener('progress', function(e) {
                    if (e.lengthComputable) {
                        const percentComplete = (e.loaded / e.total) * 100;
                        progressFill.style.width = percentComplete + '%';
                    }
                });

                // 完成上传
                xhr.addEventListener('load', function() {
                    if (xhr.status === 200) {
                        const data = JSON.parse(xhr.responseText);
                        showNotification('文件上传成功！', 'success');
                        console.log('上传结果:', data);
                    } else {
                        showNotification('文件上传失败', 'error');
                    }
                    progressContainer.style.display = 'none';
                    progressFill.style.width = '0%';
                    fileInput.value = '';
                });

                // 错误处理
                xhr.addEventListener('error', function() {
                    showNotification('上传过程中发生错误', 'error');
                    progressContainer.style.display = 'none';
                    progressFill.style.width = '0%';
                });

                xhr.open('POST', 'http://localhost:8080/storage/upload');
                xhr.setRequestHeader('Authorization', `Bearer ${authToken}`);
                xhr.send(formData);

            } catch (error) {
                showNotification('文件上传失败: ' + error.message, 'error');
                progressContainer.style.display = 'none';
                progressFill.style.width = '0%';
            }
        }

        // 显示系统信息
        function showSystemInfo() {
            const systemInfo = `
                <div style="text-align: left;">
                    <h3>🏗️ 架构信息</h3>
                    <p><strong>微服务架构:</strong> Gateway + Storage + Interaction</p>
                    <p><strong>技术栈:</strong> Go 1.25 + Gin + GORM + Redis + RabbitMQ + MinIO</p>
                    
                    <h3>📊 性能指标</h3>
                    <p><strong>QPS:</strong> 16,000+ (理论值)</p>
                    <p><strong>P99延迟:</strong> &lt; 50ms</p>
                    <p><strong>并发支持:</strong> 万级用户</p>
                    
                    <h3>🔧 核心特性</h3>
                    <p><strong>链路追踪:</strong> ✅ 全局TraceID传递</p>
                    <p><strong>死信队列:</strong> ✅ 消息失败重试机制</p>
                    <p><strong>优雅停机:</strong> ✅ 30秒超时保护</p>
                    <p><strong>高并发防护:</strong> ✅ 限流 + 幂等性检查</p>
                    
                    <h3>📈 监控指标</h3>
                    <p><strong>Prometheus:</strong> HTTP请求、抽奖统计、限流拦截</p>
                    <p><strong>日志追踪:</strong> 结构化日志 + TraceID</p>
                </div>
            `;
            
            document.getElementById('system-info').innerHTML = systemInfo;
            showModal('system-modal');
        }

        // 显示模态框
        function showModal(modalId) {
            document.getElementById(modalId).style.display = 'flex';
        }

        // 关闭模态框
        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        // 显示通知
        function showNotification(message, type) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `notification ${type} show`;
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // 定期更新系统状态
        setInterval(checkSystemStatus, 30000); // 每30秒更新一次
    </script>
</body>
</html>
