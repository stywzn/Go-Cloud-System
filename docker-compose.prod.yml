version: '3.8'

services:
  # 应用服务
  app:
    build: .
    container_name: gcs-app
    restart: unless-stopped
    ports:
      - "8080:8080"   # Gateway
      - "8081:8081"   # Interaction  
      - "8082:8082"   # Storage
      - "8083:8083"   # Compute (预留)
      - "8084:8084"   # Frontend
    environment:
      - TZ=Asia/Shanghai
      - GIN_MODE=release
    depends_on:
      - mysql
      - redis
      - rabbitmq
      - minio
    networks:
      - gcs-network
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads

  # 数据库服务
  mysql:
    image: mysql:8.0
    container_name: gcs-mysql-prod
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-your_secure_password}
      MYSQL_DATABASE: cloud_system
      MYSQL_USER: ${MYSQL_USER:-gcs_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-your_secure_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/mysql:/docker-entrypoint-initdb.d
    networks:
      - gcs-network
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # Redis缓存
  redis:
    image: redis:7.0-alpine
    container_name: gcs-redis-prod
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      - gcs-network
    command: redis-server /usr/local/etc/redis/redis.conf

  # RabbitMQ消息队列
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: gcs-rabbitmq-prod
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-your_secure_password}
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"   # AMQP端口
      - "15672:15672" # 管理界面端口
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./config/rabbitmq:/etc/rabbitmq
    networks:
      - gcs-network

  # MinIO对象存储
  minio:
    image: minio/minio:latest
    container_name: gcs-minio-prod
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-your_secure_password}
    ports:
      - "9000:9000"   # API端口
      - "9001:9001"   # Web管理端口
    volumes:
      - minio_data:/data
      - ./config/minio:/root/.minio
    networks:
      - gcs-network
    command: server /data --console-address ":9001"

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: gcs-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./config/nginx/ssl:/etc/nginx/ssl
      - ./web:/usr/share/nginx/html
    depends_on:
      - app
    networks:
      - gcs-network

  # Prometheus监控
  prometheus:
    image: prom/prometheus:latest
    container_name: gcs-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - gcs-network

  # Grafana可视化
  grafana:
    image: grafana/grafana:latest
    container_name: gcs-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - gcs-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  minio_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  gcs-network:
    driver: bridge
